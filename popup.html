<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h2 {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 12px;
      color: #fff;
    }
    .site-list {
      list-style: none;
      margin-bottom: 12px;
    }
    .site-entry {
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 4px;
    }
    .site-entry:hover {
      background: #252545;
    }
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }
    .site-domain {
      font-weight: 500;
    }
    .site-actions {
      display: flex;
      gap: 4px;
    }
    .icon-btn {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0 4px;
    }
    .icon-btn:hover { color: #aaa; }
    .icon-btn.remove:hover { color: #e44; }
    .exceptions {
      margin-top: 4px;
      padding-left: 12px;
    }
    .exception-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #6a9955;
      padding: 2px 0;
    }
    .exception-item .remove-exc {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
    }
    .exception-item .remove-exc:hover { color: #e44; }
    .add-exc-row {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }
    .add-exc-row input {
      flex: 1;
      padding: 3px 6px;
      font-size: 0.8rem;
    }
    .add-exc-row button {
      padding: 3px 8px;
      font-size: 0.75rem;
      background: #3a5a3a;
      color: #aaddaa;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .add-exc-row button:hover { background: #4a6a4a; }
    .add-row {
      display: flex;
      gap: 8px;
    }
    input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #333355;
      border-radius: 4px;
      background: #16162a;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
    }
    input:focus { border-color: #4a90d9; }
    button.add-btn {
      padding: 6px 14px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button.add-btn:hover { background: #3a7abf; }
    .empty {
      color: #555;
      font-size: 0.85rem;
      font-style: italic;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <h2>Blocked Sites</h2>
  <ul class="site-list" id="siteList"></ul>
  <div class="add-row">
    <input type="text" id="newSite" placeholder="e.g. instagram.com">
    <button class="add-btn" id="addBtn">Add</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
